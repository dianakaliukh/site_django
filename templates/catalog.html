{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Каталог</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<header>Каталог</header>

<div class="container">

    <h1>Категорії</h1>

    {% for category in categories %}
        <div class="product">
            <a href="/catalog/{{ category.id }}/">
                💎 {{ category.name }}
            </a>
        </div>
    {% endfor %}

    <a href="/" class="btn">На головну</a>

</div>

</body>
</html>
