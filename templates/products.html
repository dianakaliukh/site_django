{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Товари</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<header>Товари</header>

<div class="container">

    {% for product in products %}
        <div class="product">
            <h3>💎 {{ product.name }}</h3>
            <p>Ціна: {{ product.price }} грн</p>
        </div>
    {% endfor %}

    <a href="/catalog/" class="btn">Назад до категорій</a>

</div>

</body>
</html>
